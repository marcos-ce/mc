<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><!-- Título da Página --></title>

  <!-- Tailwind via CDN para prototipagem rápida. Remova se for usar build próprio. -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- Variáveis de Tema → Mude aqui para customizar todo o site -->
  <style>
    :root{
      --cor-base:#ff69b4;
      --cor-base-dark:#c6538e;
      --cor-fundo:#050505;
      --fonte-display:'Orbitron', sans-serif;
    }    
    body{font-family:var(--fonte-display);background:var(--cor-fundo);color:white;min-height:100dvh;}
    /* Estrelas de fundo – opcional */
    body::before{
      content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
      background-image:radial-gradient(2px 2px at 20% 30%,#fff 80%,transparent),
                       radial-gradient(2px 2px at 60% 70%,var(--cor-base) 80%,transparent);
      background-size:200% 200%;
      animation:stars 60s linear infinite;
      opacity:.4;
    }
    @keyframes stars{from{background-position:0 0}to{background-position:100% 100%}}

    /* Equalizador */
    @keyframes eq{0%,100%{height:6px;opacity:.5}50%{height:100%;opacity:1}}
  </style>

  <!-- Pré‑carrega fonte Orbitron Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body class="flex flex-col items-center px-4 pb-32 space-y-16">

  <!-- Header/Hero ----------------------------------------------------------->
  <header class="text-center pt-16" id="topo">
    <h1 class="text-4xl md:text-6xl font-black tracking-widest bg-gradient-to-r from-pink-500 via-white to-fuchsia-400 bg-clip-text text-transparent select-none drop-shadow-lg">
      <!-- Headline aqui -->
      Meu Template Profissional 🚀
    </h1>
    <p id="contador" class="mt-4 text-lg md:text-2xl text-pink-200"></p>
  </header>

  <!-- Player ----------------------------------------------------------------->
  <section aria-labelledby="titulo-player" class="w-full max-w-md bg-black/40 backdrop-blur rounded-xl shadow-lg p-6 border border-pink-700/50">
    <h2 id="titulo-player" class="sr-only">Player de Áudio</h2>

    <!-- Equalizador animado -->
    <div id="eq" class="flex justify-center gap-1 h-8 mb-3 aria-paused:opacity-40" aria-live="polite">
      <template id="tpl-bar"><div class="w-1 bg-pink-400 animate-[eq_1s_ease-in-out_infinite]"></div></template>
    </div>

    <!-- Meta da faixa -->
    <p id="displayTitulo" class="text-center text-sm uppercase tracking-wide text-pink-300 mb-4">---</p>

    <!-- Controles -->
    <div class="flex justify-center gap-3">
      <button data-action="prev" class="btn">⏮</button>
      <button data-action="toggle" class="btn font-bold px-6">▶</button>
      <button data-action="next" class="btn">⏭</button>
    </div>

    <audio id="playerAudio" preload="auto" hidden></audio>
  </section>

  <!-- Galeria ---------------------------------------------------------------->
  <section id="galeria" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 max-w-6xl w-full" aria-labelledby="titulo-galeria">
    <h2 id="titulo-galeria" class="sr-only">Galeria</h2>
    <!-- Use qualquer imagem 350×350 ou maior -->
    <template id="tpl-img">
      <figure class="relative overflow-hidden rounded-lg shadow-md bg-slate-800">
        <img src="" alt="Imagem da galeria" class="w-full h-72 object-cover grayscale hover:grayscale-0 transition duration-300" loading="lazy"/>
      </figure>
    </template>
  </section>

  <footer class="mt-16 text-xs text-pink-200 opacity-80 leading-relaxed text-center">
    Baseado em&nbsp;<a href="https://tailwindcss.com" class="underline">TailwindCSS</a>. Te amo, Mozilla ♥
  </footer>

  <!-- Playlist em JSON para facilitar manutenção -->
  <script type="application/json" id="playlist-data">
    [
      { "src":"https://cdn.example.com/audio/dom_quixote.mp3", "nome":"Dom\u00a0Quixote" },
      { "src":"https://cdn.example.com/audio/always.mp3", "nome":"Always" },
      { "src":"https://cdn.example.com/audio/fallen_star.mp3", "nome":"Fallen\u00a0Star" }
    ]
  </script>

  <!-- JavaScript modular ----------------------------------------------------->
  <script>
  (()=>{
    /* ===== Utilitários ===== */
    const qs = (sel,el=document)=>el.querySelector(sel);
    const create = (tag,props={})=>Object.assign(document.createElement(tag),props);

    /* ===== Countdown ===== */
    const inicio = new Date(2025,4,14);
    const elContador = qs('#contador');
    const fmt = n => String(n).padStart(2,'0');
    function tick(){
      const diff = Date.now()-inicio;
      if(diff<0){elContador.textContent='Em breve...';return;}
      const s = Math.floor(diff/1000);
      const dias = Math.floor(s/86400);
      const horas = Math.floor((s%86400)/3600);
      const min = Math.floor((s%3600)/60);
      const seg = s%60;
      elContador.textContent = `${dias}d ${fmt(horas)}h ${fmt(min)}m ${fmt(seg)}s`;
      requestAnimationFrame(tick);
    }
    tick();

    /* ===== Player ===== */
    const audio = qs('#playerAudio');
    const data = JSON.parse(qs('#playlist-data').textContent);
    let idx = 0;

    // Clona equalizador
    const eq = qs('#eq');
    for(let i=0;i<9;i++)eq.append(qs('#tpl-bar').content.cloneNode(true));

    const btns = {
      prev: qs('[data-action="prev"]'),
      toggle: qs('[data-action="toggle"]'),
      next: qs('[data-action="next"]')
    };
    const elTitulo = qs('#displayTitulo');

    function carrega(i){
      idx = (i+data.length)%data.length;
      const faixa = data[idx];
      audio.src = faixa.src;
      elTitulo.innerHTML = faixa.nome;
    }
    carrega(0);

    function playPause(force){
      if(force==='pause' || (!force && !audio.paused)){
        audio.pause();btns.toggle.textContent='▶';eq.dataset.paused='';
      }else{
        audio.play().catch(()=>alert('Erro ao tocar a faixa.'));btns.toggle.textContent='⏸';eq.removeAttribute('data-paused');
      }
    }

    btns.prev.onclick = ()=>{carrega(idx-1);playPause('play');};
    btns.next.onclick = ()=>{carrega(idx+1);playPause('play');};
    btns.toggle.onclick = ()=>playPause();

    audio.onended = ()=>btns.next.onclick();

    /* ===== Galeria ===== */
    const galeria = qs('#galeria');
    const imagens = [
      'https://placehold.co/400x400/202020/ff69b4?text=1',
      'https://placehold.co/400x400/202020/ff69b4?text=2',
      'https://placehold.co/400x400/202020/ff69b4?text=3',
      'https://placehold.co/400x400/202020/ff69b4?text=4',
      'https://placehold.co/400x400/202020/ff69b4?text=5',
      'https://placehold.co/400x400/202020/ff69b4?text=6'
    ];
    const tplImg = qs('#tpl-img').content;
    imagens.forEach(src=>{
      const fig = tplImg.cloneNode(true);
      fig.querySelector('img').src = src;
      galeria.append(fig);
    });
  })();
  </script>

  <!-- Acessibilidade: permite Play ao 1º clique na página em browsers que bloqueiam autoplay -->
  <script>
    document.addEventListener('click',e=>{
      const audio = document.querySelector('#playerAudio');
      if(audio && audio.paused){audio.play().catch(()=>{});}
    },{once:true});
  </script>
</body>
</html>
